<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排序算法視覺化</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 3em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.2em;
        }
        
        .algorithms {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        
        .algorithm-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            border: 2px solid #e9ecef;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .algorithm-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-decoration: none;
            color: inherit;
        }
        
        .algorithm-card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .algorithm-card p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .complexity {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .complexity strong {
            color: #667eea;
        }
        
        .complexity .time {
            color: #ff6b6b;
            font-weight: bold;
        }
        
        .complexity .space {
            color: #51cf66;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 排序算法視覺化</h1>
        <p class="subtitle">Sorting Algorithms Visualization</p>
        
        <div class="algorithms">
            <a href="bubble_sort.html" class="algorithm-card">
                <h2>🫧 氣泡排序</h2>
                <p>反覆比較相鄰元素並交換，最大的元素像氣泡一樣浮到末尾。</p>
                <div class="complexity">
                    <strong>時間複雜度:</strong> <span class="time">O(n²)</span><br>
                    <strong>空間複雜度:</strong> <span class="space">O(1)</span>
                </div>
            </a>
            
            <a href="selection_sort.html" class="algorithm-card">
                <h2>🎯 選擇排序</h2>
                <p>反覆從未排序部分選擇最小元素，放到已排序部分的末尾。</p>
                <div class="complexity">
                    <strong>時間複雜度:</strong> <span class="time">O(n²)</span><br>
                    <strong>空間複雜度:</strong> <span class="space">O(1)</span>
                </div>
            </a>
            
            <a href="insertion_sort.html" class="algorithm-card">
                <h2>📥 插入排序</h2>
                <p>將元素插入到已排序部分的正確位置。</p>
                <div class="complexity">
                    <strong>時間複雜度:</strong> <span class="time">O(n²)</span><br>
                    <strong>空間複雜度:</strong> <span class="space">O(1)</span>
                </div>
            </a>
            
            <a href="merge_sort.html" class="algorithm-card">
                <h2>🔀 合併排序</h2>
                <p>使用分治法將陣列分成兩半，遞歸排序後合併。</p>
                <div class="complexity">
                    <strong>時間複雜度:</strong> <span class="time">O(n log n)</span><br>
                    <strong>空間複雜度:</strong> <span class="space">O(n)</span>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
